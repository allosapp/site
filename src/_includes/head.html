<meta charset="utf-8">
<title>{{title}}</title>
<meta name="description" content="{{ description }}">
{% if not noindex %}<link rel="canonical" href="{{ site.baseUrl }}{{ page.url }}">{% endif %}
{% if noindex %}<meta name="robots" content="noindex, nofollow">{% endif %}
<meta content="width=device-width, initial-scale=1" name="viewport">
<link href="/css/allos.css" rel="stylesheet" type="text/css">
<link rel="preconnect" href="https://use.typekit.net" crossorigin>
<link rel="stylesheet" href="https://use.typekit.net/ciz5ttp.css">


<link href="/favicon.ico" rel="shortcut icon" type="image/x-icon">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
<meta name="msapplication-TileColor" content="#da532c">
<meta name="theme-color" content="#ffffff">
{% if extra_css %}<link href="{{ extra_css }}" rel="stylesheet" type="text/css">{% endif %}
<script defer data-domain="allos.app" src="https://plausible.io/js/script.outbound-links.js"></script>
<meta property="og:title" content="{{ title }}" />
<meta property="og:description" content="{{ description }}" />
<meta property="og:image" content="{{ site.baseUrl }}/assets/images/{{ social_image }}" />
<meta property="og:url" content="{{ site.baseUrl }}{{ page.url }}" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ title }}">
<meta name="twitter:description" content="{{ description }}">
<meta name="twitter:image" content="{{ site.baseUrl }}/assets/images/{{ social_image }}">
