---
layout: layouts/base-minimal.html
title: Profile
description: Manage your Allos profile.
noindex: true
customHead: |
  <link type="text/css" rel="stylesheet" href="/css/account-actions.css" />
  <link type="text/css" rel="stylesheet" href="/css/account/profile.css" />
customScripts: |
  <script type="module" src="/js/account/profile.js"></script>
---

<div id="user-profile-container" class="acc-acts-container">
  <div class="acc-acts-container-inner">
      <div id="loading-container" class="spinner-container">
        <div class="spinner"></div>
      </div>
      <div id="user-verify" class="acc-acts-content invisible">
        <h1>Verify Your Email</h1>
        <p>A verification email has been sent to </p>
        <p id="verify-email-address"></p>
        <button id="resend-email-btn" class="acc-acts-link-btn">
          Resend Email
        </button>
        <div class="verify-wrong-email">
          <span>Wrong email?</span>
          <button id="verify-sign-out-btn" class="acc-acts-link-btn">Sign out</button>
        </div>
      </div>
      <div id="main-content" class="acc-acts-content invisible">
        <h1>Account</h1>
        <dl class="profile-info">
          <div class="profile-row">
            <dt>Name</dt>
            <dd id="user-display-name"></dd>
          </div>
          <div class="profile-row">
            <dt>Email</dt>
            <dd id="user-email"></dd>
          </div>
          <div class="profile-row">
            <dt>Plan</dt>
            <dd id="user-tier"></dd>
          </div>
        </dl>
        <a id="user-subscribe-btn" href="/account/purchase/" class="btn-account profile-cta">
          Upgrade to Premium
        </a>
        <!-- TODO: add "Manage subscription" button for premium users — links to App Store / Play / RevenueCat customer portal -->
        <button id="sign-out-btn" class="acc-acts-link-btn profile-sign-out">
          Sign Out
        </button>
      </div>
    </div>
</div>
